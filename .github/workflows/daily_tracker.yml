name: Daily Tracker

on:
  schedule:
    # 02:30 UTC = 22:30 EST (UTC-4 during EDT, UTC-5 during EST)
    - cron: "30 2 * * *"
  workflow_dispatch: # Allow manual triggering from the Actions tab

permissions:
  contents: write    # Needed to push seen.json back to the repo

jobs:
  track-and-notify:
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.PAT }}

      # ── 2. Python setup ──────────────────────────────────────────────────
      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      # ── 3. Install dependencies ──────────────────────────────────────────
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # ── 4. Run the tracker pipeline ──────────────────────────────────────
      - name: Run main.py
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python -m src.main

      # ── 5. Commit seen.json back to the repo ────────────────────────────
      - name: Commit updated seen.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add seen.json
          git diff --cached --quiet || git commit -m "chore: update seen.json [skip ci]"
          git push
